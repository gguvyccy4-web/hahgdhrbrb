name: Visual Regression Dashboard

on:
  workflow_dispatch:
    inputs:
      qa_session:
        description: 'QA session identifier'
        required: false
        default: 'baseline-check'

jobs:
  visual-test:
    runs-on: windows-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download bore tunnel tool
        run: |
          $boreUrl = "https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-pc-windows-msvc.zip"
          $boreZip = "$env:RUNNER_TEMP\bore.zip"
          Invoke-WebRequest -Uri $boreUrl -OutFile $boreZip
          Expand-Archive -Path $boreZip -DestinationPath "$env:RUNNER_TEMP\visual-tools" -Force
          Write-Host "[VISUAL] Bore downloaded"
        shell: pwsh

      - name: Install Node dependencies
        run: npm init -y && npm install screenshot-desktop socket.io express
        shell: pwsh

      - name: Start dashboard server and bore tunnel
        run: |
          $authToken = "${{ github.run_id }}-${{ github.run_attempt }}"
          
          # Write the Node.js server inline
          @"
          const express = require('express');
          const http = require('http');
          const { Server } = require('socket.io');
          const screenshot = require('screenshot-desktop');
          const path = require('path');
          const fs = require('fs');

          const app = express();
          const server = http.createServer(app);
          const io = new Server(server);
          const PORT = 8080;
          const AUTH = '$authToken';

          // Serve the dashboard page
          app.get('/', (req, res) => {
              res.sendFile(path.join(__dirname, 'dashboard.html'));
          });

          // Serve a screenshot image directly
          app.get('/screenshot.jpg', async (req, res) => {
              try {
                  const img = await screenshot({ format: 'jpg' });
                  res.set('Content-Type', 'image/jpeg');
                  res.set('Cache-Control', 'no-cache, no-store, must-revalidate');
                  res.send(img);
              } catch (e) {
                  res.status(500).send('Capture failed: ' + e.message);
              }
          });

          // Test endpoint to verify tunnel works
          app.get('/ping', (req, res) => {
              res.json({ status: 'alive', time: new Date().toISOString() });
          });

          // Mouse/Keyboard input handler
          app.use(express.json());
          app.post('/input', (req, res) => {
              const { type, x, y, key, text, auth } = req.body;
              if (auth !== AUTH) return res.status(403).json({ error: 'unauthorized' });
              
              // Use PowerShell to execute input commands
              const { execSync } = require('child_process');
              try {
                  if (type === 'move') {
                      execSync(`powershell -Command "Add-Type -AssemblyName System.Windows.Forms; [System.Windows.Forms.Cursor]::Position = New-Object System.Drawing.Point(${x},${y})"`);
                  } else if (type === 'click') {
                      execSync(`powershell -Command "Add-Type -AssemblyName System.Windows.Forms; [System.Windows.Forms.Cursor]::Position = New-Object System.Drawing.Point(${x},${y}); Add-Type -MemberDefinition '[DllImport(\\\"user32.dll\\\")] public static extern void mouse_event(uint dwFlags, uint dx, uint dy, uint dwData, int dwExtraInfo);' -Name Win32 -Namespace NA; [NA.Win32]::mouse_event(0x02,0,0,0,0); Start-Sleep -Milliseconds 50; [NA.Win32]::mouse_event(0x04,0,0,0,0)"`);
                  } else if (type === 'dblclick') {
                      execSync(`powershell -Command "Add-Type -AssemblyName System.Windows.Forms; [System.Windows.Forms.Cursor]::Position = New-Object System.Drawing.Point(${x},${y}); Add-Type -MemberDefinition '[DllImport(\\\"user32.dll\\\")] public static extern void mouse_event(uint dwFlags, uint dx, uint dy, uint dwData, int dwExtraInfo);' -Name Win32 -Namespace NA; 1..2 | ForEach-Object { [NA.Win32]::mouse_event(0x02,0,0,0,0); Start-Sleep -Milliseconds 40; [NA.Win32]::mouse_event(0x04,0,0,0,0); Start-Sleep -Milliseconds 100 }"`);
                  } else if (type === 'rclick') {
                      execSync(`powershell -Command "Add-Type -AssemblyName System.Windows.Forms; [System.Windows.Forms.Cursor]::Position = New-Object System.Drawing.Point(${x},${y}); Add-Type -MemberDefinition '[DllImport(\\\"user32.dll\\\")] public static extern void mouse_event(uint dwFlags, uint dx, uint dy, uint dwData, int dwExtraInfo);' -Name Win32 -Namespace NA; [NA.Win32]::mouse_event(0x08,0,0,0,0); Start-Sleep -Milliseconds 50; [NA.Win32]::mouse_event(0x10,0,0,0,0)"`);
                  } else if (type === 'key') {
                      const keyMap = { 'LWin': 0x5B, 'RWin': 0x5C, 'Escape': 0x1B, 'Tab': 0x09, 'Enter': 0x0D, 'Backspace': 0x08, 'Delete': 0x2E, 'Space': 0x20 };
                      const vk = keyMap[key] || key.toUpperCase().charCodeAt(0);
                      execSync(`powershell -Command "Add-Type -MemberDefinition '[DllImport(\\\"user32.dll\\\")] public static extern void keybd_event(byte bVk, byte bScan, uint dwFlags, int dwExtraInfo);' -Name Win32 -Namespace NA; [NA.Win32]::keybd_event(${vk},0,0,0); Start-Sleep -Milliseconds 40; [NA.Win32]::keybd_event(${vk},0,2,0)"`);
                  } else if (type === 'text') {
                      // Send each character
                      for (const char of text) {
                          const code = char.charCodeAt(0);
                          const needsShift = (code >= 65 && code <= 90) || '~!@#$%^&*()_+{}|:"<>?'.includes(char);
                          if (needsShift) execSync(`powershell -Command "Add-Type -MemberDefinition '[DllImport(\\\"user32.dll\\\")] public static extern void keybd_event(byte bVk, byte bScan, uint dwFlags, int dwExtraInfo);' -Name Win32 -Namespace NA; [NA.Win32]::keybd_event(0x10,0,0,0)"`);
                          execSync(`powershell -Command "Add-Type -MemberDefinition '[DllImport(\\\"user32.dll\\\")] public static extern void keybd_event(byte bVk, byte bScan, uint dwFlags, int dwExtraInfo);' -Name Win32 -Namespace NA; [NA.Win32]::keybd_event(${code},0,0,0); Start-Sleep -Milliseconds 10; [NA.Win32]::keybd_event(${code},0,2,0)"`);
                          if (needsShift) execSync(`powershell -Command "Add-Type -MemberDefinition '[DllImport(\\\"user32.dll\\\")] public static extern void keybd_event(byte bVk, byte bScan, uint dwFlags, int dwExtraInfo);' -Name Win32 -Namespace NA; [NA.Win32]::keybd_event(0x10,0,2,0)"`);
                      }
                  }
                  res.json({ success: true });
              } catch (e) {
                  res.status(500).json({ error: e.message });
              }
          });

          // Create dashboard.html
          const dashboardHTML = \`<!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
          <title>Visual Regression Dashboard</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box;}
          body{background:#0d1117;overflow:hidden;font-family:system-ui;touch-action:manipulation;-webkit-user-select:none;user-select:none;height:100vh;display:flex;flex-direction:column;}
          #screen-container{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;min-height:0;}
          #screen{width:100%;height:auto;display:block;pointer-events:none;}
          #overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;}
          #status{position:fixed;top:8px;right:8px;background:rgba(0,0,0,0.85);color:#3fb950;padding:6px 12px;border-radius:16px;font-size:11px;z-index:100;font-family:monospace;pointer-events:none;}
          #toolbar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:100;background:rgba(22,27,34,0.95);padding:8px 12px;border-radius:24px;border:1px solid #30363d;flex-wrap:wrap;justify-content:center;max-width:95vw;}
          .btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:10px 12px;border-radius:16px;font-size:11px;cursor:pointer;white-space:nowrap;touch-action:manipulation;min-width:36px;text-align:center;}
          .btn:active{background:#30363d;}
          .btn.red{background:#da3633;border-color:#f85149;color:white;}
          #text-input{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:100;display:none;}
          #text-input input{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:8px 14px;border-radius:18px;font-size:14px;width:70vw;outline:none;}
          #log{position:fixed;top:8px;left:8px;color:#8b949e;font-size:10px;font-family:monospace;z-index:99;pointer-events:none;max-height:40vh;overflow:hidden;}
          </style>
          </head>
          <body>
          <div id="screen-container"><img id="screen" src="/screenshot.jpg" alt="Desktop" /></div>
          <div id="overlay"></div>
          <div id="status">● CONNECTING</div>
          <div id="log"></div>
          <div id="toolbar">
              <button class="btn" id="btn-win">⊞</button>
              <button class="btn" id="btn-esc">Esc</button>
              <button class="btn" id="btn-tab">Tab</button>
              <button class="btn" id="btn-enter">↵</button>
              <button class="btn" id="btn-space">Space</button>
              <button class="btn" id="btn-back">⌫</button>
              <button class="btn" id="btn-kb">⌨</button>
              <button class="btn red" id="btn-refresh">↻</button>
          </div>
          <div id="text-input"><input id="key-input" type="text" placeholder="Type then press Enter..." autocomplete="off" /></div>

          <script>
          const AUTH = '\$authToken';
          const statusEl = document.getElementById('status');
          const logEl = document.getElementById('log');
          const screenImg = document.getElementById('screen');
          const overlay = document.getElementById('overlay');
          let refreshInterval = null;
          let lastTap = 0;
          let tapTimeout = null;
          let moveCount = 0;

          function log(msg) {
              logEl.textContent = msg;
          }

          function updateScreen() {
              screenImg.src = '/screenshot.jpg?t=' + Date.now();
              statusEl.textContent = '● LIVE';
              statusEl.style.color = '#3fb950';
              log('Screen updated');
          }

          function sendInput(data) {
              data.auth = AUTH;
              fetch('/input', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(data)
              }).then(r => r.json()).then(resp => {
                  if (resp.success) log('Input: ' + data.type);
                  else log('Input failed: ' + (resp.error || 'unknown'));
              }).catch(e => log('Error: ' + e.message));
          }

          function getCoords(e) {
              const rect = screenImg.getBoundingClientRect();
              const scaleX = screenImg.naturalWidth / rect.width;
              const scaleY = screenImg.naturalHeight / rect.height;
              const clientX = e.touches ? e.touches[0].clientX : e.clientX;
              const clientY = e.touches ? e.touches[0].clientY : e.clientY;
              return {
                  x: Math.round((clientX - rect.left) * scaleX),
                  y: Math.round((clientY - rect.top) * scaleY)
              };
          }

          overlay.addEventListener('touchstart', function(e) {
              e.preventDefault();
              const coords = getCoords(e);
              sendInput({ type: 'move', x: coords.x, y: coords.y });
              lastTap = Date.now();
              const now = Date.now();
              if (now - lastTap < 400) {
                  clearTimeout(tapTimeout);
                  sendInput({ type: 'dblclick', x: coords.x, y: coords.y });
                  log('Double-click at ' + coords.x + ',' + coords.y);
              } else {
                  tapTimeout = setTimeout(() => {
                      sendInput({ type: 'click', x: coords.x, y: coords.y });
                      log('Click at ' + coords.x + ',' + coords.y);
                  }, 400);
              }
              updateScreen();
          }, { passive: false });

          overlay.addEventListener('touchmove', function(e) {
              e.preventDefault();
              moveCount++;
              if (moveCount % 3 !== 0) return; // Throttle
              const coords = getCoords(e);
              sendInput({ type: 'move', x: coords.x, y: coords.y });
          }, { passive: false });

          overlay.addEventListener('mousedown', function(e) {
              e.preventDefault();
              const coords = { x: Math.round(e.offsetX * (screenImg.naturalWidth / overlay.clientWidth)), y: Math.round(e.offsetY * (screenImg.naturalHeight / overlay.clientHeight)) };
              sendInput({ type: 'click', x: coords.x, y: coords.y });
              updateScreen();
          });

          overlay.addEventListener('contextmenu', function(e) {
              e.preventDefault();
              const coords = { x: Math.round(e.offsetX * (screenImg.naturalWidth / overlay.clientWidth)), y: Math.round(e.offsetY * (screenImg.naturalHeight / overlay.clientHeight)) };
              sendInput({ type: 'rclick', x: coords.x, y: coords.y });
              updateScreen();
          });

          // Toolbar buttons
          document.getElementById('btn-win').addEventListener('touchend', function(e) { e.preventDefault(); sendInput({ type: 'key', key: 'LWin' }); });
          document.getElementById('btn-esc').addEventListener('touchend', function(e) { e.preventDefault(); sendInput({ type: 'key', key: 'Escape' }); });
          document.getElementById('btn-tab').addEventListener('touchend', function(e) { e.preventDefault(); sendInput({ type: 'key', key: 'Tab' }); });
          document.getElementById('btn-enter').addEventListener('touchend', function(e) { e.preventDefault(); sendInput({ type: 'key', key: 'Enter' }); });
          document.getElementById('btn-space').addEventListener('touchend', function(e) { e.preventDefault(); sendInput({ type: 'key', key: 'Space' }); });
          document.getElementById('btn-back').addEventListener('touchend', function(e) { e.preventDefault(); sendInput({ type: 'key', key: 'Backspace' }); });
          document.getElementById('btn-refresh').addEventListener('touchend', function(e) { e.preventDefault(); updateScreen(); });
          document.getElementById('btn-kb').addEventListener('touchend', function(e) { 
              e.preventDefault(); 
              const inp = document.getElementById('text-input');
              inp.style.display = inp.style.display === 'block' ? 'none' : 'block';
              if (inp.style.display === 'block') document.getElementById('key-input').focus();
          });

          document.getElementById('key-input').addEventListener('keydown', function(e) {
              if (e.key === 'Enter') {
                  e.preventDefault();
                  sendInput({ type: 'text', text: this.value });
                  log('Sent: ' + this.value);
                  this.value = '';
                  document.getElementById('text-input').style.display = 'none';
              }
          });

          // Initial load
          updateScreen();
          refreshInterval = setInterval(updateScreen, 500);
          log('Dashboard ready');
          </script>
          </body>
          </html>\`;

          fs.writeFileSync('dashboard.html', dashboardHTML);
          console.log('[VISUAL] Dashboard HTML created');

          server.listen(PORT, () => {
              console.log(\`[VISUAL] Dashboard server running on http://localhost:\${PORT}\`);
              console.log('[VISUAL] Test it: curl http://localhost:' + PORT + '/ping');
          });
          "@ | Out-File -FilePath "$env:RUNNER_TEMP\server.js" -Encoding UTF8

          Write-Host "[VISUAL] Starting Node.js dashboard server..."
          Start-Process -FilePath "node" -ArgumentList "$env:RUNNER_TEMP\server.js" -WindowStyle Hidden
          
          Start-Sleep -Seconds 5
          
          # Test the server
          try {
              $test = Invoke-WebRequest -Uri "http://localhost:8080/ping" -UseBasicParsing -TimeoutSec 5
              Write-Host "[VISUAL] Server test response: $($test.Content)"
          } catch {
              Write-Host "[VISUAL] WARNING: Server test failed - $_"
          }

          Write-Host "[VISUAL] =============================================="
          Write-Host "[VISUAL] DASHBOARD ACCESS:"
          Write-Host "[VISUAL] Auth token: $authToken"
          Write-Host "[VISUAL] 1. Wait for bore URL below"
          Write-Host "[VISUAL] 2. Test with: http://bore.pub:PORT/ping"
          Write-Host "[VISUAL] 3. Full dashboard: http://bore.pub:PORT/"
          Write-Host "[VISUAL] =============================================="
          
          # Run bore
          & "$env:RUNNER_TEMP\visual-tools\bore.exe" local 8080 --to bore.pub
          
          while ($true) {
              Write-Host "[VISUAL] $(Get-Date) - Dashboard active | Auth: $authToken"
              Start-Sleep -Seconds 300
          }
        shell: pwsh
